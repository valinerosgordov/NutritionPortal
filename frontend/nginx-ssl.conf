# HTTPS server
server {
    listen 443 ssl;
    server_name federation-preventive.ru www.federation-preventive.ru xn----7sbldbigg0dp4b3a2j.xn--p1ai www.xn----7sbldbigg0dp4b3a2j.xn--p1ai;

    ssl_certificate /etc/letsencrypt/live/xn----7sbldbigg0dp4b3a2j.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn----7sbldbigg0dp4b3a2j.xn--p1ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location ^~ /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Proxy uploaded files
    location ^~ /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Swagger/OpenAPI
    location ^~ /openapi/ {
        proxy_pass http://backend:5000/openapi/;
        proxy_set_header Host $host;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
