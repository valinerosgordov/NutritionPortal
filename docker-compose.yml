services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrition-backend
    restart: unless-stopped
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/wwwroot/uploads
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/registration.db
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=RegistrationApp
      - Jwt__Audience=RegistrationApp
      - Jwt__ExpirationInHours=24
      - AdminSeed__Email=${ADMIN_EMAIL:-admin@admin.com}
      - AdminSeed__Password=${ADMIN_PASSWORD:-Admin123!}
      - Smtp__Host=${SMTP_HOST:-}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL:-}
      - Smtp__FromName=${SMTP_FROM_NAME:-Федерация специалистов превентивного здоровья}
      - Cors__Origins__0=${FRONTEND_URL:-http://localhost}
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutrition-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: nutrition-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  backend-data:
  backend-uploads:
  certbot-conf:
  certbot-www:

networks:
  app-network:
    driver: bridge
